<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .b{font-family:var(--font-headline);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:6px 10px;border:2px solid var(--kc-black);display:inline-flex;align-items:center;gap:6px;line-height:1}
  .b.solid{background:var(--kc-black);color:var(--kc-bone)}
  .b.bone{background:var(--kc-bone);color:var(--kc-black)}
  .b.live{background:#B00020;color:var(--kc-bone);border-color:#B00020}
  .dot{width:8px;height:8px;border-radius:999px;background:currentColor}
  .b.win{background:var(--kc-black);color:var(--kc-bone)}
  .b.draw{background:var(--kc-fog);color:var(--kc-black);border-color:var(--kc-black)}
  .b.loss{background:var(--kc-bone);color:var(--kc-black);border-color:var(--kc-black);text-decoration:line-through}
</style></head><body><div class="card">
<span class="b live"><span class="dot" style="background:var(--kc-bone)"></span>LIVE 67'</span>
<span class="b solid">Matchday</span>
<span class="b bone">Sold Out</span>
<span class="b win">W</span>
<span class="b draw">D</span>
<span class="b loss">L</span>
<span class="b solid">Members</span>
<span class="b bone">Away</span>
</div></body></html>
