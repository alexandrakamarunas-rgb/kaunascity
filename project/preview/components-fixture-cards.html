<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone);display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .fix{background:var(--kc-paper);border:2px solid var(--kc-black);padding:16px}
  .fix.hard{box-shadow:var(--shadow-hard)}
  .row1{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3)}
  .teams{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px}
  .team{font-family:var(--font-display);font-size:24px;line-height:1;text-transform:uppercase;letter-spacing:-.01em}
  .score{font-family:var(--font-display);font-size:40px;line-height:1;letter-spacing:-.02em}
  .vs{font-family:var(--font-headline);font-size:14px;letter-spacing:.2em;color:var(--fg3)}
  .mt{font-family:var(--font-headline);font-weight:600;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg2);margin-top:10px;border-top:2px solid var(--kc-black);padding-top:8px}
</style></head><body><div class="card">
<div class="fix hard">
  <div class="row1"><span>SAT 04 MAY · 19:00</span><span>HOME</span></div>
  <div class="teams"><span class="team">Kaunas</span><span class="vs">vs</span><span class="team">Žalgiris</span></div>
  <div class="mt">Stand €8 · Seat €15</div>
</div>
<div class="fix">
  <div class="row1"><span>SUN 28 APR · FT</span><span>AWAY</span></div>
  <div class="teams"><span class="team">Sūduva</span><span class="score">0—3</span><span class="team">Kaunas</span></div>
  <div class="mt">3 points. No complaints.</div>
</div>
</div></body></html>
