<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone)}
  table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:13px}
  th,td{padding:8px 6px;text-align:left;border-bottom:1px solid rgba(10,10,10,.18)}
  th{font-family:var(--font-headline);font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3);border-bottom:2px solid var(--kc-black);padding-bottom:6px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.team{font-family:var(--font-headline);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  tr.us td{background:var(--kc-black);color:var(--kc-bone);border-bottom-color:var(--kc-black)}
</style></head><body><div class="card">
<table>
<thead><tr><th class="num">#</th><th>Club</th><th class="num">P</th><th class="num">W</th><th class="num">D</th><th class="num">L</th><th class="num">GD</th><th class="num">PTS</th></tr></thead>
<tbody>
<tr><td class="num">1</td><td class="team">Žalgiris</td><td class="num">12</td><td class="num">9</td><td class="num">2</td><td class="num">1</td><td class="num">+18</td><td class="num">29</td></tr>
<tr class="us"><td class="num">2</td><td class="team">Kaunas City</td><td class="num">12</td><td class="num">8</td><td class="num">3</td><td class="num">1</td><td class="num">+14</td><td class="num">27</td></tr>
<tr><td class="num">3</td><td class="team">Sūduva</td><td class="num">12</td><td class="num">7</td><td class="num">2</td><td class="num">3</td><td class="num">+9</td><td class="num">23</td></tr>
<tr><td class="num">4</td><td class="team">Panevėžys</td><td class="num">12</td><td class="num">5</td><td class="num">4</td><td class="num">3</td><td class="num">+4</td><td class="num">19</td></tr>
</tbody></table>
</div></body></html>
