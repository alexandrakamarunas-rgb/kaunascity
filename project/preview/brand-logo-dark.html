<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-black)}
  .card{width:700px;box-sizing:border-box;padding:0;background:var(--kc-black);color:var(--kc-bone);display:grid;grid-template-columns:240px 1fr;gap:0;align-items:stretch;min-height:240px}
  .crest-wrap{display:flex;align-items:center;justify-content:center;border-right:2px solid var(--kc-bone)}
  .crest-wrap img{width:200px;height:200px;display:block}
  .info{padding:28px 32px;display:flex;flex-direction:column;justify-content:center;gap:10px}
  .name{font-family:var(--font-display);font-size:42px;line-height:.9;letter-spacing:-.01em;text-transform:uppercase;margin:0}
  .est{font-family:var(--font-headline);font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-muted-inverse)}
  .rule{height:6px;background:var(--kc-bone);width:72px;margin:6px 0}
  .body{font-family:var(--font-body);font-size:13px;color:var(--fg-muted-inverse);max-width:340px;line-height:1.5;margin:0}
</style></head><body><div class="card">
<div class="crest-wrap"><img src="../assets/logo-on-dark.png" alt="Kaunas City crest on dark"></div>
<div class="info">
  <span class="est">PRIMARY · DARK SURFACES</span>
  <h2 class="name">Stand<br>or Sit</h2>
  <div class="rule"></div>
  <p class="body">Crest as supplied — black disc, grey ball, bone wordmark. Use on Ink (#0A0A0A) or photography with a 90% black scrim. Min 32px. Clear-space ≥ height of the "K".</p>
</div>
</div></body></html>
