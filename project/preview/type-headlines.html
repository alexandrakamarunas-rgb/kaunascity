<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:22px 28px;background:var(--kc-bone);color:var(--kc-black)}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid rgba(10,10,10,.18);padding:10px 0}
  .row:last-child{border-bottom:none}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);width:80px;flex:none}
  .h1{font-family:var(--font-headline);font-weight:700;font-size:48px;line-height:1;letter-spacing:.01em;text-transform:uppercase}
  .h2{font-family:var(--font-headline);font-weight:600;font-size:32px;line-height:1;letter-spacing:.02em;text-transform:uppercase}
  .h3{font-family:var(--font-headline);font-weight:600;font-size:22px;line-height:1;letter-spacing:.03em;text-transform:uppercase}
  .eb{font-family:var(--font-headline);font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3)}
</style></head><body><div class="card">
<div class="row"><span class="lbl">H1</span><span class="h1">Stand or Sit</span></div>
<div class="row"><span class="lbl">H2</span><span class="h2">Fixtures · May</span></div>
<div class="row"><span class="lbl">H3</span><span class="h3">Squad Numbers</span></div>
<div class="row"><span class="lbl">Eyebrow</span><span class="eb">Matchday Programme</span></div>
</div></body></html>
