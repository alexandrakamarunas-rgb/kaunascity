<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{aspect-ratio:1/1;border:2px solid var(--kc-black);position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .sw .name{font-family:var(--font-headline);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .sw .hex{font-family:var(--font-mono);font-size:10px;color:inherit;opacity:.8;margin-top:2px}
  .light{color:var(--kc-black)}
  .dark{color:var(--kc-bone)}
</style></head><body><div class="card">
<div class="grid">
  <div class="sw dark" style="background:var(--kc-black)"><div class="name">INK</div><div class="hex">#0A0A0A</div></div>
  <div class="sw dark" style="background:var(--kc-pitch)"><div class="name">PITCH</div><div class="hex">#000000</div></div>
  <div class="sw light" style="background:var(--kc-bone);border:2px solid var(--kc-black)"><div class="name">BONE</div><div class="hex">#F4F1EA</div></div>
  <div class="sw light" style="background:var(--kc-paper);border:2px solid var(--kc-black)"><div class="name">PAPER</div><div class="hex">#FFFFFF</div></div>
</div>
</div></body></html>
