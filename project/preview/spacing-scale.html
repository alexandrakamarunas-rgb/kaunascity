<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone)}
  .row{display:flex;align-items:flex-end;gap:8px}
  .bar{background:var(--kc-black);width:24px;display:flex;align-items:flex-end;justify-content:center;color:var(--kc-bone);font-family:var(--font-mono);font-size:9px;padding-bottom:4px;letter-spacing:.05em}
  .lbl{font-family:var(--font-mono);font-size:9px;color:var(--fg3);text-align:center;margin-top:4px;letter-spacing:.05em}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head><body><div class="card">
<div class="row">
  <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="lbl">16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="lbl">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="lbl">32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="lbl">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="lbl">64</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="lbl">96</div></div>
  <div class="col"><div class="bar" style="height:128px"></div><div class="lbl">128</div></div>
</div>
</div></body></html>
