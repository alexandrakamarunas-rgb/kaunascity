<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-black)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-black);color:var(--kc-bone);display:flex;align-items:center;gap:24px}
  .nav{display:flex;gap:22px;font-family:var(--font-headline);font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase}
  .nav a{color:var(--kc-bone);text-decoration:none;opacity:.85;cursor:pointer}
  .nav a.active{opacity:1;border-bottom:2px solid var(--kc-bone);padding-bottom:2px}
  .nav a:hover{opacity:1}
  .crest{height:48px;width:48px}
  .name{font-family:var(--font-display);font-size:22px;letter-spacing:-.01em;line-height:1}
  .right{margin-left:auto;display:flex;gap:12px;align-items:center}
  .btn{font-family:var(--font-headline);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:8px 14px;border:2px solid var(--kc-bone);background:var(--kc-bone);color:var(--kc-black);cursor:pointer}
</style></head><body><div class="card">
<img src="../assets/logo-inverse.png" class="crest" alt="">
<span class="name">Kaunas City</span>
<nav class="nav"><a class="active">Matches</a><a>Squad</a><a>Tickets</a><a>News</a><a>Shop</a></nav>
<div class="right"><button class="btn">Sign In</button></div>
</div></body></html>
