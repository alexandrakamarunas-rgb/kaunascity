<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone);display:flex;gap:18px;align-items:center}
  .b{background:var(--kc-paper);border:2px solid var(--kc-black);padding:18px 22px;font-family:var(--font-headline);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.1em}
  .b.s1{box-shadow:var(--shadow-sm)}
  .b.s2{box-shadow:var(--shadow-md)}
  .b.s3{box-shadow:var(--shadow-hard)}
  .b.s4{box-shadow:var(--shadow-hard-lg)}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin-top:8px;text-align:center}
  .group{display:flex;flex-direction:column;align-items:center}
</style></head><body><div class="card">
<div class="group"><div class="b s1">SM</div><div class="lbl">soft 1px</div></div>
<div class="group"><div class="b s2">MD</div><div class="lbl">soft 4px</div></div>
<div class="group"><div class="b s3">HARD</div><div class="lbl">6px offset</div></div>
<div class="group"><div class="b s4">HARD LG</div><div class="lbl">10px offset</div></div>
</div></body></html>
