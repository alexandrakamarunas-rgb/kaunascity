<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:22px 28px;background:var(--kc-bone);color:var(--kc-black)}
  .row{display:grid;grid-template-columns:110px 1fr;gap:14px;padding:10px 0;border-bottom:1px solid rgba(10,10,10,.18);align-items:baseline}
  .row:last-child{border:none}
  .lbl{font-family:var(--font-headline);font-weight:700;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3)}
  .ex{font-family:var(--font-body);font-size:15px;line-height:1.5;color:var(--fg1)}
  .ex.head{font-family:var(--font-headline);font-weight:700;font-size:18px;letter-spacing:.04em;text-transform:uppercase;line-height:1.15}
  .ex.bad{color:#B00020;text-decoration:line-through;font-style:italic}
</style></head><body><div class="card">
<div class="row"><span class="lbl">Headline</span><span class="ex head">Prisijunk prie komandos.</span></div>
<div class="row"><span class="lbl">CTA</span><span class="ex head">Registruokis į pirmą treniruotę →</span></div>
<div class="row"><span class="lbl">Body</span><span class="ex">Akademija vaikams nuo 5 iki 12 metų. Treniruotės vyksta du kartus per savaitę, treniruoja Lukas Spalvis. Pirma treniruotė nemokama.</span></div>
<div class="row"><span class="lbl">Off-brand</span><span class="ex bad">Linksmas futbolas visai šeimai! 🎉⚽ Ateikite ir pasilinksminkite!</span></div>
</div></body></html>
