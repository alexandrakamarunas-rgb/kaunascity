<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .sw{aspect-ratio:2/1;border:2px solid var(--kc-black);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:var(--kc-bone)}
  .sw .name{font-family:var(--font-headline);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .sw .hex{font-family:var(--font-mono);font-size:10px;opacity:.85;margin-top:2px}
  .note{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin-top:12px}
</style></head><body><div class="card">
<div class="grid">
  <div class="sw" style="background:#2E7D32"><div class="name">SUCCESS</div><div class="hex">#2E7D32</div></div>
  <div class="sw" style="background:#B26A00"><div class="name">WARNING</div><div class="hex">#B26A00</div></div>
  <div class="sw" style="background:#B00020"><div class="name">DANGER</div><div class="hex">#B00020</div></div>
</div>
<div class="note">Functional only. Never decorative. Never feature.</div>
</div></body></html>
