<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:28px;background:var(--kc-bone);display:flex;gap:20px;align-items:center}
  img{width:140px;height:140px}
  .lock{display:flex;flex-direction:column;gap:4px}
  .name{font-family:var(--font-display);font-size:38px;line-height:.9;letter-spacing:-.01em;text-transform:uppercase;color:var(--kc-black)}
  .est{font-family:var(--font-headline);font-weight:600;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3)}
  .rule{height:4px;background:var(--kc-black);width:64px;margin:8px 0}
  .body{font-family:var(--font-body);font-size:14px;color:var(--fg2);max-width:330px;line-height:1.5}
</style></head><body><div class="card">
<img src="../assets/logo-primary.png" alt="Kaunas City crest">
<div class="lock">
  <span class="est">EST. 2025 · KAUNAS · LT</span>
  <span class="name">Kaunas<br>City FC</span>
  <div class="rule"></div>
  <p class="body">Primary mark. 32px minimum. Clear-space ≥ height of the crest's "K".</p>
</div>
</div></body></html>
