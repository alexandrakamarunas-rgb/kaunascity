<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone);display:flex;gap:14px;align-items:flex-end}
  .r{background:var(--kc-paper);border:2px solid var(--kc-black);width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;letter-spacing:.06em}
  .r1{border-radius:0}
  .r2{border-radius:2px}
  .r3{border-radius:4px}
  .r4{border-radius:999px;width:60px;height:60px}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin-top:8px;text-align:center;width:90px}
  .col{display:flex;flex-direction:column;align-items:center}
  .note{margin-left:auto;font-family:var(--font-body);font-size:13px;color:var(--fg2);max-width:240px;line-height:1.4}
</style></head><body><div class="card">
<div class="col"><div class="r r1">0</div><div class="lbl">Default</div></div>
<div class="col"><div class="r r2">2</div><div class="lbl">Inputs</div></div>
<div class="col"><div class="r r3">4</div><div class="lbl">Max</div></div>
<div class="col"><div class="r r4">●</div><div class="lbl">Status dot</div></div>
<div class="note">Square is the default. The pill is reserved for one thing: live-match status.</div>
</div></body></html>
