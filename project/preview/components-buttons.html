<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone);display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--font-headline);font-weight:700;font-size:14px;letter-spacing:.14em;text-transform:uppercase;padding:14px 22px;border:2px solid var(--kc-black);background:var(--kc-black);color:var(--kc-bone);cursor:pointer;box-shadow:var(--shadow-hard);transition:transform var(--dur-fast) var(--ease-snap),box-shadow var(--dur-fast) var(--ease-snap),background var(--dur-fast),color var(--dur-fast)}
  .btn:hover{background:var(--kc-bone);color:var(--kc-black)}
  .btn:active{transform:translate(2px,2px);box-shadow:4px 4px 0 var(--kc-black)}
  .btn.ghost{background:transparent;color:var(--kc-black);box-shadow:none}
  .btn.ghost:hover{background:var(--kc-black);color:var(--kc-bone)}
  .btn.sm{padding:8px 14px;font-size:11px}
  .btn[disabled]{opacity:.3;pointer-events:none}
</style></head><body><div class="card">
<button class="btn">Buy Tickets</button>
<button class="btn ghost">Squad</button>
<button class="btn sm">Filter</button>
<button class="btn" disabled>Sold Out</button>
</div></body></html>
