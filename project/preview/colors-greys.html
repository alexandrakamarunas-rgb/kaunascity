<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:24px 28px;background:var(--kc-bone)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{aspect-ratio:1/1;border:2px solid var(--kc-black);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:var(--kc-black)}
  .sw .name{font-family:var(--font-headline);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .sw .hex{font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:2px}
</style></head><body><div class="card">
<div class="grid">
  <div class="sw" style="background:var(--kc-ash);color:var(--kc-bone)"><div class="name">ASH</div><div class="hex">#6B6B6B</div></div>
  <div class="sw" style="background:var(--kc-fog)"><div class="name">FOG</div><div class="hex">#A8A8A8</div></div>
  <div class="sw" style="background:var(--kc-concrete)"><div class="name">CONCRETE</div><div class="hex">#D9D6CF</div></div>
  <div class="sw" style="background:var(--kc-pitch-stripe)"><div class="name">STRIPE</div><div class="hex">#C8C2B6</div></div>
</div>
</div></body></html>
