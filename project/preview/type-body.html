<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--kc-bone)}
  .card{width:700px;box-sizing:border-box;padding:22px 28px;background:var(--kc-bone);color:var(--kc-black);display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .lead{font-family:var(--font-body);font-weight:500;font-size:20px;line-height:1.4;color:var(--fg1);margin:0}
  .body{font-family:var(--font-body);font-weight:400;font-size:15px;line-height:1.55;color:var(--fg2);margin:6px 0 0}
  .meta{font-family:var(--font-mono);font-weight:400;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg3);margin-top:8px;border-top:1px solid rgba(10,10,10,.18);padding-top:6px}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);margin-bottom:6px}
</style></head><body><div class="card">
<div><div class="lbl">Lead · Archivo 500</div><p class="lead">Kaunas City won three points and gave nothing back.</p></div>
<div><div class="lbl">Body · Archivo 400</div><p class="body">A controlled performance from the back, two goals before the hour, and a closed door for the rest of the night. Saturday at the Dariaus ir Girėno.</p>
<div class="meta">SAT 04 MAY · 19:00 · STAND €8</div></div>
</div></body></html>
